<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCADA — прибор</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, monospace;
      background: #0b0f19;
      color: #cbd5e1;
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex: 1;
    }

    .controls-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.4rem;
      margin-left: auto;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    select {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 0.35rem;
      padding: 0.3rem 0.55rem;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: #38bdf8; }

    .status {
      font-size: 0.75rem;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .dot.error   { background: #ef4444; }
    .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .progress { height: 2px; background: #1e293b; border-radius: 1px; overflow: hidden; width: 100%; }
    .progress-bar { height: 100%; background: #0ea5e9; width: 100%; transition: width linear; }

    .chart-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 0.6rem;
      padding: 1rem;
    }

    canvas { width: 100% !important; height: 100% !important; }

    .error-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #f87171;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1 id="pageTitle">Загрузка...</h1>
  <div class="controls-wrap">
    <div class="controls">
      <span style="font-size:0.8rem;color:#475569">Период:</span>
      <select id="rangeSelect">
        <option value="3">3 мин</option>
        <option value="10" selected>10 мин</option>
        <option value="30">30 мин</option>
        <option value="60">1 час</option>
      </select>
      <span style="font-size:0.8rem;color:#475569">Авто:</span>
      <select id="intervalSelect">
        <option value="0">Выкл</option>
        <option value="1">1 с</option>
        <option value="3">3 с</option>
        <option value="5" selected>5 с</option>
      </select>
    <div style="display:flex;flex-direction:column;align-items:stretch;gap:0.35rem">
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Загрузка...</span>
      </div>
      <div class="progress" id="progressWrap" hidden>
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>
</header>

<div class="chart-wrap" id="chartWrap">
  <canvas id="chartCanvas"></canvas>
</div>

<script>
  const API_URL  = 'http://scada.local:8888/api/opc';
  const MAX_HIST = 1000;

  const ERR_VALUES = new Set(['65535', '8388608', '4294967295']);

  const COLORS = [
    '#38bdf8','#4ade80','#f59e0b','#f87171','#a78bfa',
    '#34d399','#fb923c','#818cf8','#e879f9','#2dd4bf',
  ];

  const params = new URLSearchParams(location.search);
  const title  = params.get('title') || 'Прибор';
  const keys   = params.getAll('key');
  const names  = params.getAll('name');

  document.title = `SCADA — ${title}`;
  document.getElementById('pageTitle').textContent = title;

  const history = {};
  keys.forEach(k => { history[k] = []; });

  let chartInstance = null;
  let autoTimer     = null;
  let currentInterval = 5;

  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');
  const intervalSel  = document.getElementById('intervalSelect');
  const rangeSel     = document.getElementById('rangeSelect');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar  = document.getElementById('progressBar');
  const chartWrap    = document.getElementById('chartWrap');

  function buildChart() {
    const cutoff = new Date(Date.now() - parseInt(rangeSel.value) * 60 * 1000);

    const allLabels = [...new Set(
      keys.flatMap(k => history[k].filter(p => p.t >= cutoff).map(p => p.t.toLocaleTimeString('ru')))
    )];

    const datasets = keys.map((key, i) => {
      const pts     = history[key].filter(p => p.t >= cutoff);
      const timeMap = new Map(pts.map(p => [p.t.toLocaleTimeString('ru'), p.v]));
      const color   = COLORS[i % COLORS.length];
      return {
        label: names[i] || key,
        data: allLabels.map(t => timeMap.has(t) ? timeMap.get(t) : null),
        borderColor: color,
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: allLabels.length > 100 ? 0 : 2,
        pointHoverRadius: 4,
        tension: 0.3,
        fill: false,
        spanGaps: false,
      };
    });

    if (chartInstance) {
      // Сохраняем скрытые датасеты по label
      const hidden = new Set(
        chartInstance.data.datasets
          .filter((_, i) => !chartInstance.isDatasetVisible(i))
          .map(ds => ds.label)
      );
      datasets.forEach(ds => { if (hidden.has(ds.label)) ds.hidden = true; });
      chartInstance.data.labels   = allLabels;
      chartInstance.data.datasets = datasets;
      chartInstance.update('none');
      return;
    }

    chartInstance = new Chart(document.getElementById('chartCanvas'), {
      type: 'line',
      data: { labels: allLabels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: { display: true, labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.raw === null ? 'Ошибка' : ctx.raw}`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#475569', maxTicksLimit: 10, maxRotation: 0 }, grid: { color: '#1e293b' } },
          y: { ticks: { color: '#475569' }, grid: { color: '#1e293b' } },
        }
      }
    });
  }

  async function fetchData() {
    statusDot.className = 'dot loading';
    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const t = new Date();
      keys.forEach(key => {
        const raw = data[key];
        if (raw === undefined) return;
        const v = ERR_VALUES.has(String(raw)) ? null : parseFloat(raw);
        history[key].push({ t, v: isNaN(v) ? null : v });
        if (history[key].length > MAX_HIST) history[key].shift();
      });

      buildChart();

      statusDot.className = 'dot';
      statusText.textContent = `Обновлено: ${t.toLocaleTimeString()}`;
    } catch (e) {
      statusDot.className = 'dot error';
      statusText.textContent = `Ошибка: ${e.message}`;
    }
  }

  function startProgress(sec) {
    progressWrap.hidden = false;
    progressBar.style.transition = 'none';
    progressBar.style.width = '100%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progressBar.style.transition = `width ${sec}s linear`;
      progressBar.style.width = '0%';
    }));
  }

  function scheduleAuto() {
    clearInterval(autoTimer);
    const sec = parseInt(intervalSel.value);
    currentInterval = sec;
    if (sec === 0) { progressWrap.hidden = true; return; }
    startProgress(sec);
    autoTimer = setInterval(() => {
      fetchData().then(() => { if (currentInterval > 0) startProgress(currentInterval); });
    }, sec * 1000);
  }

  rangeSel.addEventListener('change', buildChart);
  intervalSel.addEventListener('change', scheduleAuto);
  fetchData().then(scheduleAuto);
</script>
</body>
</html>
