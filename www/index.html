<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCADA Monitor</title>
  <script src="chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, monospace;
      background: #0b0f19;
      color: #cbd5e1;
      min-height: 100vh;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    h1 { font-size: 1.3rem; font-weight: 700; color: #f1f5f9; letter-spacing: 0.05em; }
    h1 span { color: #38bdf8; }

    .controls-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.4rem;
      margin-left: auto;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .interval-label { font-size: 0.8rem; color: #475569; }

    select {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 0.35rem;
      padding: 0.3rem 0.55rem;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: #38bdf8; }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 0.35rem;
      padding: 0.35rem 0.9rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #0284c7; }
    button:disabled { background: #1e293b; color: #475569; cursor: default; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .loading .spinner { display: inline-block; }
    .loading .btn-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #475569;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .dot.error   { background: #ef4444; }
    .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .progress { height: 2px; background: #1e293b; border-radius: 1px; overflow: hidden; width: 100%; }
    .progress-bar { height: 100%; background: #0ea5e9; width: 100%; transition: width linear; }

    #output { margin-top: 1.25rem; }

    .sections { display: flex; flex-direction: column; gap: 1.25rem; }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #38bdf8;
      margin-bottom: 0.6rem;
      border-left: 3px solid #0ea5e9;
      padding-left: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .section-title:hover { color: #7dd3fc; }

    .section-toggle { font-size: 0.6rem; color: #475569; transition: transform 0.2s; }
    .section.collapsed .section-toggle { transform: rotate(-90deg); }
    .section.collapsed .card-rows      { display: none; }
    .section.collapsed .section-title  { margin-bottom: 0; }

    .groups { display: flex; flex-wrap: wrap; gap: 0.75rem; }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 0.6rem;
      min-width: 200px;
      overflow: hidden;
      flex: 1 1 200px;
      max-width: 340px;
    }

    .card-title {
      background: #1e293b;
      padding: 0.45rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }
    .card-title:hover { background: #263348; color: #cbd5e1; }
    .card-title.has-errors { color: #f87171; background: #2d1515; }
    .card-title.has-errors:hover { background: #3d1a1a; }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0.75rem;
      border-bottom: 1px solid #1e293b;
      gap: 0.5rem;
      cursor: pointer;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: #1a2537; }
    .row:hover .var-name { color: #94a3b8; }

    .var-name {
      font-size: 0.8rem;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 1;
      min-width: 0;
    }

    .val {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Courier New', monospace;
    }

    .val-ok   { color: #4ade80; }
    .val-err  { color: #ef4444; opacity: 0.7; font-style: italic; }
    .val-warn { color: #f59e0b; }
    .val-str  { color: #a78bfa; }

    .err-val { display: none; }
    body.show-err-vals .err-dash { display: none; }
    body.show-err-vals .err-val  { display: inline; }

    .error-state, .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #475569;
    }
    .error-state { color: #f87171; }
    small { font-size: 0.75rem; opacity: 0.7; display: block; margin-top: 0.5rem; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 0.75rem;
      width: 100%;
      max-width: 1100px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-body { padding: 1rem; overflow-y: auto; }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: #1e293b;
    }

    .modal-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { color: #f1f5f9; background: none; }

    .modal-no-data {
      text-align: center;
      color: #475569;
      padding: 3rem 1rem;
      font-size: 0.85rem;
    }

    .chart-wrap { position: relative; height: 300px; }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .chart-card {
      background: #0b0f19;
      border: 1px solid #1e293b;
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .chart-card-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: #64748b;
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid #1e293b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chart-card-body { position: relative; height: 160px; padding: 0.5rem; }
  </style>
</head>
<body>

<header>
  <h1>SCADA <span>Monitor</span></h1>
  <div class="controls-wrap">
    <div class="controls">
      <span class="interval-label">Авто:</span>
      <select id="intervalSelect">
        <option value="0">Выкл</option>
        <option value="1">1 с</option>
        <option value="3">3 с</option>
        <option value="5" selected>5 с</option>
      </select>
      <button id="refreshBtn" onclick="fetchData()">
        <span class="btn-icon">↻</span>
        <span class="spinner"></span>
        Обновить
      </button>
    </div>
    <div class="progress" id="progressWrap" hidden>
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status-bar">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Загрузка...</span>
    </div>
    <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:#475569;cursor:pointer;user-select:none;">
      <input type="checkbox" id="hideErrors" style="accent-color:#0ea5e9;width:13px;height:13px;cursor:pointer;" />
      Значения ошибок
    </label>
  </div>
</header>

<div id="output"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  const API_URL  = 'http://scada.local:8888/api/opc';
  const MAX_HIST = 1000;

  const ERR_VALUES  = new Set(['65535', '8388608', '4294967295']);
  const WARN_VALUES = new Set(['888']);

  const history = {};

  let autoTimer     = null;
  let currentInterval = 5;
  let chartInstance = null;

  const btn          = document.getElementById('refreshBtn');
  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');
  const output       = document.getElementById('output');
  const intervalSel  = document.getElementById('intervalSelect');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar  = document.getElementById('progressBar');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalTitle   = document.getElementById('modalTitle');
  const modalBody    = document.getElementById('modalBody');

  function storeHistory(data) {
    const t = new Date();
    for (const [key, rawVal] of Object.entries(data)) {
      if (!history[key]) history[key] = [];
      const v = ERR_VALUES.has(String(rawVal)) ? null : parseFloat(rawVal);
      history[key].push({ t, v: isNaN(v) ? null : v });
      if (history[key].length > MAX_HIST) history[key].shift();
    }
  }

  function parseData(data) {
    const tree = {};
    for (const [rawKey, rawVal] of Object.entries(data)) {
      const parts = rawKey.replace(/^\/+/, '').split('/').filter(Boolean);
      let section, group, name;
      if (parts.length === 0) {
        section = 'Other'; group = '—'; name = rawKey;
      } else if (parts.length === 1) {
        section = parts[0]; group = '—'; name = parts[0];
      } else if (parts.length === 2) {
        section = parts[0]; group = parts[0]; name = parts[1];
      } else {
        section = parts[0];
        group   = parts.slice(1, -1).join('/');
        name    = parts[parts.length - 1];
        const dot = name.indexOf('.');
        if (dot !== -1) name = name.slice(dot + 1);
      }
      if (!tree[section]) tree[section] = {};
      if (!tree[section][group]) tree[section][group] = [];
      tree[section][group].push({ key: rawKey, name, value: String(rawVal) });
    }
    return tree;
  }

  function formatValue(v) {
    if (ERR_VALUES.has(v))  return `<span class="val val-err"><span class="err-dash">—</span><span class="err-val">${escHtml(v)}</span></span>`;
    if (WARN_VALUES.has(v)) return `<span class="val val-warn">${v}</span>`;
    if (!isNaN(v) && v.trim() !== '') {
      const n = parseFloat(v);
      return `<span class="val val-ok">${Number.isInteger(n) ? n.toLocaleString('ru') : n.toFixed(4)}</span>`;
    }
    return `<span class="val val-str">${escHtml(v)}</span>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTree(tree) {
    if (!tree || Object.keys(tree).length === 0)
      return `<div class="empty-state">Нет данных</div>`;

    return `<div class="sections">${
      Object.entries(tree).map(([section, groups]) => `
        <div class="section">
          <div class="section-title" onclick="this.closest('.section').classList.toggle('collapsed')">
            ${escHtml(section)}<span class="section-toggle">▼</span>
          </div>
          <div class="groups">${
            Object.entries(groups).map(([group, rows]) => `
              <div class="card">
                <div class="card-title${rows.some(r => ERR_VALUES.has(r.value)) ? ' has-errors' : ''}">${escHtml(group)}</div>
                <div class="card-rows">${
                  rows.map(({key, name, value}) => `
                    <div class="row" data-key="${escHtml(key)}" data-name="${escHtml(name)}">
                      <span class="var-name" title="${escHtml(name)}">${escHtml(name)}</span>
                      ${formatValue(value)}
                    </div>`).join('')
                }</div>
              </div>`).join('')
          }</div>
        </div>`).join('')
    }</div>`;
  }

  function showChart(key, name) {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    const pts = history[key] || [];
    modalTitle.textContent = key;

    if (pts.length < 2) {
      modalBody.innerHTML = `<div class="modal-no-data">Недостаточно данных — нужно хотя бы 2 точки.<br>Подождите несколько обновлений.</div>`;
    } else {
      modalBody.innerHTML = `<div class="chart-wrap"><canvas id="chartCanvas"></canvas></div>`;
      chartInstance = new Chart(document.getElementById('chartCanvas'), {
        type: 'line',
        data: {
          labels: pts.map(p => p.t.toLocaleTimeString('ru')),
          datasets: [{
            label: name,
            data: pts.map(p => p.v),
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56,189,248,0.08)',
            borderWidth: 2,
            pointRadius: pts.length > 50 ? 0 : 3,
            pointHoverRadius: 5,
            pointBackgroundColor: '#38bdf8',
            tension: 0.3,
            fill: true,
            spanGaps: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ctx.raw === null ? 'Ошибка датчика' : String(ctx.raw),
              }
            }
          },
          scales: {
            x: { ticks: { color: '#475569', maxTicksLimit: 8, maxRotation: 0 }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#475569' }, grid: { color: '#1e293b' } },
          }
        }
      });
    }
    modalOverlay.classList.add('open');
  }

  function showDeviceCharts(cardEl) {
    const title = cardEl.querySelector('.card-title').textContent.trim();
    const rows  = [...cardEl.querySelectorAll('.row[data-key]')];

    const url = new URL('device.html', location.href);
    url.searchParams.set('title', title);
    rows.forEach(r => {
      url.searchParams.append('key', r.dataset.key);
      url.searchParams.append('name', r.dataset.name);
    });

    window.open(url.toString(), '_blank');
  }

  function closeModal(e) {
    if (e && e.target !== modalOverlay) return;
    modalOverlay.classList.remove('open');
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  output.addEventListener('click', e => {
    const cardTitle = e.target.closest('.card-title');
    if (cardTitle) { showDeviceCharts(cardTitle.closest('.card')); return; }
    const row = e.target.closest('.row[data-key]');
    if (row) showChart(row.dataset.key, row.dataset.name);
  });

  async function fetchData() {
    btn.classList.add('loading');
    btn.disabled = true;
    statusDot.className = 'dot loading';

    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      storeHistory(data);

      const collapsed = new Set(
        [...output.querySelectorAll('.section.collapsed')]
          .map(s => s.querySelector('.section-title')?.firstChild?.textContent?.trim())
          .filter(Boolean)
      );

      output.innerHTML = renderTree(parseData(data));

      output.querySelectorAll('.section').forEach(sec => {
        const name = sec.querySelector('.section-title')?.firstChild?.textContent?.trim();
        if (name && collapsed.has(name)) sec.classList.add('collapsed');
      });

      statusDot.className = 'dot';
      statusText.textContent = `Обновлено: ${new Date().toLocaleTimeString()}  ·  ${Object.keys(data).length} переменных`;
    } catch (e) {
      statusDot.className = 'dot error';
      statusText.textContent = `Ошибка: ${e.message}`;
      output.innerHTML = `<div class="error-state">Не удалось получить данные с ${API_URL}<small>${e.message}</small></div>`;
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function startProgress(sec) {
    progressWrap.hidden = false;
    progressBar.style.transition = 'none';
    progressBar.style.width = '100%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progressBar.style.transition = `width ${sec}s linear`;
      progressBar.style.width = '0%';
    }));
  }

  function scheduleAuto() {
    clearInterval(autoTimer);
    const sec = parseInt(intervalSel.value);
    currentInterval = sec;
    if (sec === 0) { progressWrap.hidden = true; return; }
    startProgress(sec);
    autoTimer = setInterval(() => {
      fetchData().then(() => { if (currentInterval > 0) startProgress(currentInterval); });
    }, sec * 1000);
  }

  document.getElementById('hideErrors').addEventListener('change', e => {
    document.body.classList.toggle('show-err-vals', e.target.checked);
  });

  intervalSel.addEventListener('change', scheduleAuto);
  fetchData().then(scheduleAuto);
</script>
</body>
</html>
