// An example configuration file that stores information about a store.
// Basic store information:

// ======= PLC/registers definitions: =======

maintitle = "MODBUS config";

plc:
(
  { title = "PLC32";
    name = "Def";
    desc  = "TVP basic config";
    polling = 1000;
    timeout = 300000; // (microSecond)
    ip = "192.168.1.32";
    port = 502;
    attempts = 2;
    @include "./conf/regs_tvp.cfg"
  },

  { title = "PLC35";
    name = "Buf";
    desc  = "TVP basic config";
    polling = 1000; 	// (miLLi Seconds) polling interval 
    timeout = 300000;	// (miCRo Seconds) timeout interval - how long to wait modbus response
    ip = "192.168.1.35";
    port = 502;
    attempts = 2;
    @include "./conf/regs_tvp.cfg"
  },

  { title = "PLC39";
    name = "Kub";
    desc  = "PWR 3-phase config";
    polling = 1000; 	// (miLLi Seconds) polling interval 
    timeout = 300000;	// (miCRo Seconds) timeout interval - how long to wait modbus response
    ip = "192.168.1.39";
    port = 502;
    attempts = 2;
    @include "./conf/regs_pwr.cfg"
  },

// ==========================================

  { title = "TH16-41";
    name = "TH41";
    desc  = "Sonoff TH16 socket";
    polling = 4100;
    timeout = 300000; // (microSecond)
    ip = "192.168.1.41";
    port = 502;
    attempts = 3;
    @include "./conf/regs_th.cfg"
  },

  { title = "TH16-42";
    name = "TH42";
    desc  = "Sonoff TH16 socket";
    polling = 4200;
    timeout = 300000; // (microSecond)
    ip = "192.168.1.42";
    port = 502;
    attempts = 2;
    @include "./conf/regs_th.cfg"
  },

