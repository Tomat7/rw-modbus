//
// ======= SCADA registers definitions: =======
//
// rname && rmode && rtype - is mandatory (NOT EMPTY) parameter for SCADA variable
//
// rsource && rfolder - may be empty ("") for any SCADA registers/variable
//
// rsource = "-" - mean register not linked with Modbus register
// rsource = "DEVICE.regname" - SCADA register linked with PLC register named "DEVICE.regname"
// rsource - is prohibited for Modbus register
//
// raddr - prohibited parameter for SCADA registers (??) - will be IGNORED
//
// Be careful - no checks and "try" will pass if wrong value in mixed/unnamed var!
// Warning - sequence/order is important!
// Tuple order: ( rname, rmode, rtype, rfolder, rsource )

// ======= Test regs
//( rname,       rmode, rtype,   rfolder, rsource   )

  ( "Millis",    "rw",  "u",     "",      "-" ),
  ( "Double",    "rw",  "Float", "",      "-" ),

// ======= Mapping of Modbus regs to SCADA (with type translation)

  ( "Tkub1",      "r",  "f100",  "Temp", "Kub.Temp1" ),
  ( "Tkub2",      "r",  "f100",  "Temp", "Buf.Temp3" ),
  ( "Tbuf",       "r",  "f100",  "Temp", "Buf.Temp2" ),
  ( "Tdef",       "r",  "f100",  "Temp", "Def.Temp1" ),
  ( "Ttsa",       "r",  "f100",  "Temp", "Def.Temp3" ),
  ( "Pset",       "rw", "u",     "",     "Kub.Pset"  ),
  ( "Pnow",       "r",  "u",     "",     "Kub.Pnow"  ),
  ( "OverPress",  "r",  "u",     "",     "Buf.Press" ),
  ( "AbsPress",   "r",  "u",     "",     "Def.Press" ),

// ======= SCADA regs (calculated within program or set from external)

  ( "Process",    "rw", "u" ),
  ( "Mode",       "rw", "u" ),

  ( "P.heat",     "rw", "u" ),
  ( "P.dist",     "rw", "u" ),
  ( "P.rect",     "rw", "u" ),
  ( "Pshift",     "rw", "i" ),

  ( "Tkub0",      "rw", "f",     "Temp" ),
  ( "T_boil",     "rw", "float", "Temp" ),
  ( "T_heat",     "rw", "float", "Temp" ),

// ======= SCADA regs ALARMS (calculated within program)

  ( "Alarm.MB",   "rw", "u",     "Alarm" ),
  ( "Alarm.DS",   "rw", "u",     "Alarm" ),
  ( "Alarm.T",    "rw", "u",     "Alarm" ),
  ( "Alarm.P",    "rw", "u",     "Alarm" ),


