//
// ======= SCADA registers definitions: =======
//
// rname && rsource && rmode && rtype - is mandatory parameter for SCADA variable
//
// rfolder - not necessary parameter for ANY registers/variable
//
// rsource = "-" - mean register not linked with Modbus register
// rsource = "DEVICE.regname" - SCADA register linked with PLC register named "DEVICE.regname"
// rsource - is prohibited for Modbus register
//
// raddr - prohibited parameter for SCADA registers (??) - will be IGNORED
//
// Be careful - no checks and "try" will pass if wrong value in mixed/unnamed var!
// Warning - sequence/order is important!
// Tuple order: ( rname, rsource, rmode, rtype, rfolder )

// ======= Test regs
//( rname,    rsource,       rmode, rtype,  rfolder )

  ( "Millis",   "-",          "rw", "u",     ""     ),
  ( "Double",   "-",          "rw", "Float", ""     ),

// ======= Mapping of Modbus regs to SCADA (with type translation)

  ( "Tkub1",     "Kub.Temp1", "r",  "f100", "Temp" ),
  ( "Tkub2",     "Buf.Temp3", "r",  "f100", "Temp" ),
  ( "Tbuf",      "Buf.Temp2", "r",  "f100", "Temp" ),
  ( "Tdef",      "Def.Temp1", "r",  "f100", "Temp" ),
  ( "Ttsa",      "Def.Temp3", "r",  "f100", "Temp" ),
  ( "Pset",      "Kub.Pset",  "rw", "u",    ""     ),
  ( "Pnow",      "Kub.Pnow",  "r",  "u",    ""     ),
  ( "OverPress", "Buf.Press", "r",  "u",    ""     ),
  ( "AbsPress",  "Def.Press", "r",  "u",    ""     ),

// ======= SCADA regs (calculated within program or set from external)

  ( "Process", "-", "rw", "u",     ""     ),
  ( "Mode",    "-", "rw", "u",     ""     ),

  ( "P.heat",  "-", "rw", "u",     ""     ),
