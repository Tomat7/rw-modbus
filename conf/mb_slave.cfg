slavetitle = "MODBUS Slave config";

slave:
(
  { var = "Tkub";  	source = "-";         regaddr = 1; },
  { var = "Tkub1"; 	source = "Kub.Temp1"; regaddr = 2; },
  { var = "Tkub2"; 	source = "Buf.Temp1"; regaddr = 3; },

  { var = "Tbuf"; 	source = "Buf.Temp3"; regaddr = 4; },
  { var = "Tdef"; 	source = "Def.Temp1"; regaddr = 5; },
  { var = "Ttsa"; 	source = "Def.Temp3"; regaddr = 6; },

  { var = "OverPress"; 	source = "Buf.Press"; regaddr = 7; },
  { var = "AbsPress";  	source = "Def.Press"; regaddr = 8; }

//{ var = "Tkub"; source = "Virtual"; }
);
